<template>
    <div class="program-page">

        <!-- ================= HEADER ================= -->
        <div class="header-section">
            <div class="header-content">
                <button class="back-btn" onclick={goBack}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5"></path>
                        <path d="M12 19l-7-7 7-7"></path>
                    </svg>
                    Back to Programmes
                </button>

                <div class="title-wrapper">
                    <h1 class="program-title">{program.Name}</h1>
                    <span class="badge">{program.Program_Type__c}</span>
                </div>
            </div>
        </div>

        <!-- ================= TABS ================= -->
        <div class="tabs-container">
            <div class="tabs-content">
                <a href="#overview" class="tab active" onclick={handleTabClick}>Overview</a>
                <a href="#eligibility" class="tab" onclick={handleTabClick}>Eligibility</a>
                <a href="#funding" class="tab" onclick={handleTabClick}>Funding</a>
                <a href="#documents" class="tab" onclick={handleTabClick}>Required Documents</a>
                
            </div>
        </div>

        <div class="main-body">

            <!-- ================= LEFT CONTENT ================= -->
            <div class="left-content card">

                <!-- ========== OVERVIEW (DYNAMIC) ========== -->
                <section id="overview" class="content-section">
                    <h2>Overview</h2>

                    <template if:true={program.Overview__c}>
                        <lightning-formatted-rich-text
                            value={program.Overview__c}>
                        </lightning-formatted-rich-text>
                    </template>

                    <template if:false={program.Overview__c}>
                        <p>No overview available for this program.</p>
                    </template>
                </section>


                <!-- ========== ELIGIBILITY (DYNAMIC) ========== -->
                <section id="eligibility" class="content-section">
                    <h2>Eligibility</h2>
                    <p>Organizations must meet all of the following requirements to be eligible:</p>

                    <template if:true={eligibilities.length}>
                        <ul class="check-list">
                            <template for:each={eligibilities} for:item="item">
                                <li key={item.Id}>
                                    <svg class="check-icon" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                                    </svg>
                                    {item.Name}
                                </li>
                            </template>
                        </ul>
                    </template>

                    <template if:false={eligibilities.length}>
                        <p>No eligibility criteria defined.</p>
                    </template>
                </section>


                <!-- ========== FUNDING (STATIC) ========== -->
                <section id="funding" class="content-section">
                    <h2>Funding</h2>
                    <div class="funding-box">
                        <div class="funding-col border-right">
                            <div class="fund-item">
                                <span class="label">Funding Up to</span>
                                <span class="value">${program.Max_Amount__c}</span>
                            </div>
                            <div class="fund-item">
                                <span class="label">Total Program Budget</span>
                                <span class="value">${program.Program_Fund__c}</span>
                            </div>
                        </div>
                        <div class="funding-col">
                            <span class="label">Disbursement Structure</span>
                            <div class="disbursement-split">
                                <div class="split-item">
                                    <span class="percent">70%</span>
                                    <span class="phase">First Installment</span>
                                    <span class="desc">Upon signing grant agreement</span>
                                </div>
                                <div class="split-item">
                                    <span class="percent">30%</span>
                                    <span class="phase">Final Installment</span>
                                    <span class="desc">After satisfactory performance</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>


                <!-- ========== REQUIRED DOCUMENTS (TEMP STATIC) ========== -->
                <section id="documents" class="content-section">
    <h2>Required Documents</h2>

    <template if:true={documents.length}>
        <ul class="doc-list">
            <template for:each={documents} for:item="doc">
                <li key={doc.Id}>
                    <svg class="doc-icon" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                    </svg>

                    <span>
                        {doc.Name}
                        <template if:true={doc.Is_Mandatory__c}>
                            <span class="mandatory">*</span>
                        </template>
                    </span>
                </li>
            </template>
        </ul>
    </template>

    <template if:false={documents.length}>
        <p>No documents required for this program.</p>
    </template>
</section>

                <!-- Selection & Application remain unchanged -->

            </div>

            <!-- ================= RIGHT SIDEBAR ================= -->
            <div class="right-sidebar">

                <div class="apply-card card">

                    <h3>Apply for Funding</h3>

                    <p class="sub-label">Maximum Funding</p>
                    <p class="amount">${program.Max_Amount__c}</p>
                    <p class="per-project">Per Project</p>

                    <template if:true={isApplyDisabled}>
                        <div class="status-box">
                            <div class="status-icon">🔒</div>
                            <div class="status-text">
                                <p class="status-title">Application Locked</p>
                                <p class="status-desc">{applyMessage}</p>
                            </div>
                        </div>
                    </template>

                    <button 
                        class="btn-primary"
                        onclick={openApplication}
                        disabled={isApplyDisabled}>
                        Apply Now
                    </button>

                    <p class="time-hint">Takes 10-15 minutes to complete</p>
                </div>

            </div>

        </div>
    </div>
</template>
